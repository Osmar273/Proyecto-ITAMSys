<div class="flex justify-center pt-8 pb-10 px-6 bg-gray-50 min-h-full">
  <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-2xl border border-gray-100">
    <h2 class="text-3xl font-black text-gray-800 mb-8 text-center uppercase tracking-tighter">
      {{ esEdicion ? 'Editar Personal' : 'Registrar Personal' }}
    </h2>

    <form (ngSubmit)="guardar()" #f="ngForm" class="space-y-6">
      <div>
        <label class="block text-sm font-bold text-gray-600 mb-2">Nombre Completo</label>
        <input type="text" name="nombreCompleto" [(ngModel)]="usuario.nombreCompleto" required
               class="w-full px-5 py-4 rounded-2xl border-2 border-gray-100 focus:border-blue-500 outline-none bg-gray-50">
      </div>

      <div class="grid grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-bold text-gray-600 mb-2">Cargo</label>
          <input type="text" name="cargo" [(ngModel)]="usuario.cargo" required placeholder="Ej: Analista, Gerente..."
                 class="w-full px-5 py-4 rounded-2xl border-2 border-gray-100 focus:border-blue-500 outline-none bg-gray-50">
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-600 mb-2">Departamento</label>
          <select name="departamento" [(ngModel)]="usuario.departamento" required
                  class="w-full px-5 py-4 rounded-2xl border-2 border-gray-100 focus:border-blue-500 outline-none bg-gray-50">
            <option value="" disabled selected>Seleccione un área...</option>
            <option value="Sistemas / TI">Sistemas / TI</option>
            <option value="Recursos Humanos">Recursos Humanos</option>
            <option value="Administración y Finanzas">Administración y Finanzas</option>
            <option value="Ventas y Marketing">Ventas y Marketing</option>
            <option value="Operaciones / Logística">Operaciones / Logística</option>
            <option value="Gerencia General">Gerencia General</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-sm font-bold text-gray-600 mb-2">Correo Electrónico</label>
        <input type="email" name="email" [(ngModel)]="usuario.email"
               class="w-full px-5 py-4 rounded-2xl border-2 border-gray-100 focus:border-blue-500 outline-none bg-gray-50">
      </div>

      <div class="flex gap-4 pt-6">
        <button type="button" routerLink="/usuarios" class="flex-1 py-4 bg-gray-200 text-gray-700 rounded-2xl font-black uppercase hover:bg-gray-300 transition-all">
          Cancelar
        </button>
        <button type="submit" [disabled]="!f.valid" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black uppercase hover:bg-blue-700 shadow-lg disabled:opacity-50 transition-all">
          {{ esEdicion ? 'Actualizar' : 'Guardar' }}
        </button>
      </div>
    </form>
  </div>
</div>

<div class="min-h-screen bg-gray-50 p-8">
  <div class="max-w-5xl mx-auto">

    <div class="flex justify-between items-center mb-6">
      <div>
        <h2 class="text-2xl font-bold text-gray-900">
          {{ esEdicion ? 'Editar Equipo' : 'Registrar Nuevo Equipo' }}
        </h2>
        <p class="text-gray-500 text-sm mt-1">
          {{ esEdicion ? 'Modifique los detalles técnicos del activo ya registrado.' : 'Ingrese los detalles técnicos del activo para el sistema ITAM.' }}
        </p>
      </div>
      <a routerLink="/equipos" class="text-gray-500 hover:text-gray-700 font-medium flex items-center gap-2 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Volver a Equipos
      </a>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
      <form (ngSubmit)="guardar()" #f="ngForm" class="space-y-8">

        <div>
          <h3 class="text-lg font-semibold text-gray-800 mb-4 border-b pb-2">Información General</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Código ITAM (Automático o Manual)</label>
              <input type="text" name="codigoItam" [(ngModel)]="equipo.codigoItam" placeholder="Ej: EQ-LPT-005" required
                     class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de Equipo</label>
              <select name="tipo" [(ngModel)]="equipo.tipo" required
                      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-white">
                <option value="" disabled selected>Selecciona un tipo...</option>
                <option value="Laptop">Laptop</option>
                <option value="Desktop">Desktop</option>
                <option value="Monitor">Monitor</option>
                <option value="Periférico">Periférico</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Marca</label>
              <input type="text" name="marca" [(ngModel)]="equipo.marca" placeholder="Ej: Lenovo, Dell, HP" required
                     class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Modelo</label>
              <input type="text" name="modelo" [(ngModel)]="equipo.modelo" placeholder="Ej: ThinkPad T14 Gen 3"
                     class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>
          </div>
        </div>

        <div>
          <h3 class="text-lg font-semibold text-gray-800 mb-4 border-b pb-2">Identificación Técnica</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Número de Serie (S/N)</label>
              <input type="text" name="numeroSerie" [(ngModel)]="equipo.numeroSerie" placeholder="Ingresa el número de serie único"
                     class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Dirección MAC (Opcional)</label>
              <input type="text" name="direccionMac" [(ngModel)]="equipo.direccionMac" placeholder="00:1A:2B:3C:4D:5E"
                     class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Estado Inicial</label>
              <select name="estado" [(ngModel)]="equipo.estado" required
                      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-white">
                <option value="Disponible">Disponible (En Stock)</option>
                <option value="Asignado">Asignado</option>
                <option value="Mantenimiento">Mantenimiento</option>
                <option value="Baja Definitiva">Baja Definitiva</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Adquisición</label>
              <input type="date" name="fechaAdquisicion" [(ngModel)]="equipo.fechaAdquisicion"
                     class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-gray-600">
            </div>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Especificaciones Rápidas o Notas</label>
          <textarea name="notas" [(ngModel)]="equipo.notas" rows="3" placeholder="Ejemplo: Core i7, 16 GB de RAM, 512 GB de SSD. Teclado en español."
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all resize-none"></textarea>
        </div>

        <div class="flex justify-end gap-4 pt-4 border-t border-gray-100">
          <button type="button" routerLink="/equipos"
                  class="px-6 py-2.5 border border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-50 transition-all">
            Cancelar
          </button>

          <button type="submit" [disabled]="!f.valid"
                  class="px-6 py-2.5 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 shadow-sm disabled:opacity-50 transition-all flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
            </svg>
            {{ esEdicion ? 'Actualizar Cambios' : 'Guardar Activo' }}
          </button>
        </div>

      </form>
    </div>
  </div>
</div>

<div class="p-8 bg-gray-50 min-h-screen text-gray-900">
  <div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-10">
      <div>
        <h1 class="text-3xl font-extrabold tracking-tight">Directorio de Personal</h1>
        <p class="text-gray-500 mt-1">Control de acceso y auditoría de empleados.</p>
      </div>
      <button routerLink="/usuarios/nuevo" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg transition-all">
        + Nuevo Empleado
      </button>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <table class="w-full text-left">
        <thead class="bg-gray-100 border-b border-gray-200">
          <tr>
            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">ID</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Personal</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Cargo</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Estado</th>
            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase text-right">Acciones</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
          <tr *ngFor="let u of listaUsuarios" class="hover:bg-blue-50 transition-colors" [ngClass]="{'opacity-60 grayscale': !u.activo}">
            <td class="px-6 py-4 text-sm">#{{ u.idEmpleado }}</td>
            <td class="px-6 py-4">
              <div class="text-sm font-semibold text-gray-900">{{ u.nombreCompleto }}</div>
              <div class="text-xs text-gray-400">{{ u.email }}</div>
            </td>
            <td class="px-6 py-4 text-sm text-gray-600">{{ u.cargo }}</td>
            <td class="px-6 py-4">
              <span [ngClass]="u.activo ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'" class="px-3 py-1 rounded-full text-xs font-bold uppercase">
                {{ u.activo ? 'Activo' : 'Inactivo' }}
              </span>
            </td>
            <td class="px-6 py-4 text-right flex justify-end gap-4">
              <button (click)="editar(u)" class="text-blue-600 font-bold text-sm hover:underline">Editar</button>
              <button (click)="toggleEstado(u.idEmpleado)" [ngClass]="u.activo ? 'text-red-500' : 'text-green-600'" class="font-bold text-sm hover:underline">
                {{ u.activo ? 'Deshabilitar' : 'Habilitar' }}
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

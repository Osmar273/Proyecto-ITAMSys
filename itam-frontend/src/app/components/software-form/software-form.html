<div class="flex justify-center items-center min-h-screen bg-gray-100 p-6">
  <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-2xl border border-gray-100">
    <h2 class="text-3xl font-black text-gray-800 mb-8 text-center uppercase tracking-tighter">
      {{ esEdicion ? 'Editar Licencia' : 'Registrar Software' }}
    </h2>

    <form (ngSubmit)="guardar()" #f="ngForm" class="space-y-6">
      <div>
        <label class="block text-sm font-bold text-gray-600 mb-2">Nombre del Software</label>
        <input type="text" name="nombre" [(ngModel)]="software.nombre" required placeholder="Ej: Microsoft Office 2024"
               class="w-full px-5 py-4 rounded-2xl border-2 border-gray-100 focus:border-blue-500 outline-none bg-gray-50">
      </div>

      <div class="grid grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-bold text-gray-600 mb-2">Versión</label>
          <input type="text" name="version" [(ngModel)]="software.version" required placeholder="Ej: 2.5.0"
                 class="w-full px-5 py-4 rounded-2xl border-2 border-gray-100 focus:border-blue-500 outline-none bg-gray-50">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-600 mb-2">Fecha de Vencimiento</label>
          <input type="date" name="fechaVencimiento" [(ngModel)]="software.fechaVencimiento" required
                 class="w-full px-5 py-4 rounded-2xl border-2 border-gray-100 focus:border-blue-500 outline-none bg-gray-50">
        </div>
      </div>

      <div>
        <label class="block text-sm font-bold text-gray-600 mb-2">Clave de Licencia (Product Key)</label>
        <input type="text" name="licenciaClave" [(ngModel)]="software.licenciaClave" required placeholder="XXXXX-XXXXX-XXXXX"
               class="w-full px-5 py-4 rounded-2xl border-2 border-gray-100 focus:border-blue-500 outline-none bg-gray-50 font-mono text-blue-600">
      </div>

      <div class="flex gap-4 pt-6">
        <button type="button" routerLink="/software" class="flex-1 py-4 bg-gray-200 text-gray-700 rounded-2xl font-black uppercase hover:bg-gray-300 transition-all">
          Cancelar
        </button>
        <button type="submit" [disabled]="!f.valid" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black uppercase hover:bg-blue-700 shadow-lg disabled:opacity-50 transition-all">
          {{ esEdicion ? 'Actualizar' : 'Guardar' }}
        </button>
      </div>
    </form>
  </div>
</div>

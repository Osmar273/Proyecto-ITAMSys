      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">

          <h3 class="text-4xl font-bold text-gray-900">{{ licenciasActivas }}</h3>
        </div>
        <div class="w-12 h-12 bg-green-50 text-green-600 rounded-full flex items-center justify-center">

          <h3 class="text-4xl font-bold text-gray-900">{{ activosAsignados }}</h3>
        </div>
        <div class="w-12 h-12 bg-purple-50 text-purple-600 rounded-full flex items-center justify-center">

        <div>
          <p class="text-sm font-medium text-gray-500 mb-1">En Mantenimiento</p>
          <h3 class="text-4xl font-bold text-red-600">{{ enMantenimiento }}</h3>
        </div>
        <div class="w-12 h-12 bg-red-50 text-red-600 rounded-full flex items-center justify-center">
